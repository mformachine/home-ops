---
# POSTGRESQL PERSISTENT VOLUME CLAIM
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: n8n-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
# POSTGRESQL DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: n8n-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
      initContainers:
        - name: fix-volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 70:70 /var/lib/postgresql/data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            runAsUser: 70
            runAsGroup: 70
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: n8n-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: n8n-credentials
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
---
# POSTGRESQL SERVICE
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: n8n-prod
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
