---
# STIRLING-PDF DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling-pdf
  namespace: n8n-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stirling-pdf
  template:
    metadata:
      labels:
        app: stirling-pdf
    spec:
      containers:
        - name: stirling-pdf
          image: stirlingtools/stirling-pdf:2.7.3
          ports:
            - containerPort: 8080
          env:
            - name: SECURITY_ENABLELOGIN
              value: "false"
            - name: LANGS
              value: "en_GB"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v1/info/status
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/info/status
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
---
# STIRLING-PDF SERVICE (For internal K8s communication)
apiVersion: v1
kind: Service
metadata:
  name: stirling-pdf
  namespace: n8n-prod
spec:
  selector:
    app: stirling-pdf
  ports:
    - port: 8080
      targetPort: 8080