---
# GOTENBERG DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotenberg
  namespace: n8n-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gotenberg
  template:
    metadata:
      labels:
        app: gotenberg
    spec:
      containers:
        - name: gotenberg
          image: gotenberg/gotenberg:8
          ports:
            - containerPort: 3000
          env:
            - name: GOTENBERG_API_TIMEOUT
              value: "60s"
            - name: GOTENBERG_CHROMIUM_MAX_QUEUE_SIZE
              value: "20"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
# GOTENBERG SERVICE (For internal K8s communication)
apiVersion: v1
kind: Service
metadata:
  name: gotenberg
  namespace: n8n-prod
spec:
  selector:
    app: gotenberg
  ports:
    - port: 3000
      targetPort: 3000